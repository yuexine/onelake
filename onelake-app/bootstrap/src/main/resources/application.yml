spring:
  application:
    name: onelake-app
  task:
    scheduling:
      # Outbox Stream 消费会阻塞等待消息；至少保留一个线程给 cron/backfill 等调度任务。
      pool:
        size: ${SPRING_TASK_SCHEDULING_POOL_SIZE:2}
  datasource:
    url: ${JDBC_URL:jdbc:postgresql://localhost:5432/onelake}
    username: ${JDBC_USER:onelake}
    password: ${JDBC_PASSWORD:onelake}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 10000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: common
        jdbc:
          time_zone: UTC
        format_sql: false
    show-sql: false
    open-in-view: false
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:false}
    baseline-on-migrate: true
    schemas: common,integration,orchestration,catalog,modeling,quality,security,dataservice,dataservice_api,analytics
    locations: >
      classpath:db/migration/common,
      classpath:db/migration/integration,
      classpath:db/migration/orchestration,
      classpath:db/migration/catalog,
      classpath:db/migration/modeling,
      classpath:db/migration/quality,
      classpath:db/migration/security,
      classpath:db/migration/dataservice,
      classpath:db/migration/analytics
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_URL:http://localhost:8081}/realms/onelake
          jwk-set-uri: ${KEYCLOAK_URL:http://localhost:8081}/realms/onelake/protocol/openid-connect/certs

  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    timeout: 2000ms

server:
  port: 8080
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env,loggers
  endpoint:
    health:
      show-details: always
  health:
    db:
      enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# 数据面组件端点（控制面只"驱动"它们）
onelake:
  webclient:
    connect-timeout-ms: 3000
    read-timeout-ms: 60000
  catalog:
    lineage:
      default-depth: ${CATALOG_LINEAGE_DEFAULT_DEPTH:3}
      impact:
        subscription-high-threshold: ${CATALOG_LINEAGE_SUB_HIGH:10}
        jobs-medium-threshold: ${CATALOG_LINEAGE_JOBS_MED:5}
  orchestration:
    # 流水线执行灰度开关：LEGACY 走旧单 op；GRAPH 走节点级图执行器。
    pipeline-execution-mode: ${ONELAKE_PIPELINE_EXECUTION_MODE:LEGACY}
    callback-base-url: ${ONELAKE_ORCHESTRATION_CALLBACK_BASE_URL:${ONELAKE_CALLBACK_BASE_URL:}}
    internal-token: ${ONELAKE_ORCHESTRATION_INTERNAL_TOKEN:${ONELAKE_INTERNAL_TOKEN:}}
    max-parallel: ${ONELAKE_ORCHESTRATION_MAX_PARALLEL:4}
  dataplane:
    airbyte:
      base-url: ${AIRBYTE_URL:http://localhost:18001/api/v1}
      auth:
        client-id: ${AIRBYTE_CLIENT_ID:}
        client-secret: ${AIRBYTE_CLIENT_SECRET:}
        token-path: ${AIRBYTE_TOKEN_PATH:/applications/token}
      workspace-id: ${AIRBYTE_WORKSPACE_ID:}
      destination-id: ${AIRBYTE_DESTINATION_ID:}
      destination-definition-id: ${AIRBYTE_DESTINATION_DEFINITION_ID:}
      destination-config: ${AIRBYTE_DESTINATION_CONFIG:{}}
      source-definitions:
        mysql: ${AIRBYTE_MYSQL_SOURCE_DEFINITION_ID:}
        postgres: ${AIRBYTE_POSTGRES_SOURCE_DEFINITION_ID:}
    dagster:
      graphql-url: ${DAGSTER_GRAPHQL_URL:http://localhost:3000/graphql}
      schedule-enabled: ${DAGSTER_SCHEDULE_ENABLED:false}
      repository-name: ${DAGSTER_REPOSITORY_NAME:onelake}
      location-name: ${DAGSTER_LOCATION_NAME:onelake-loc}
      schedule-reconcile-job: ${DAGSTER_SCHEDULE_RECONCILE_JOB:onelake_sync_task_schedule_reconcile}
    openmetadata:
      base-url: ${OPENMETADATA_URL:http://localhost:8585/api/v1}
      token: ${OM_TOKEN:}
      writeback-enabled: ${OPENMETADATA_WRITEBACK_ENABLED:false}
    trino:
      jdbc-url: ${TRINO_JDBC_URL:jdbc:trino://localhost:18080/iceberg}
      user: ${TRINO_USER:onelake}
      password: ${TRINO_PASSWORD:}
      max-rows: ${SQL_WORKBENCH_MAX_ROWS:200}
      max-interactive-rows: ${SQL_WORKBENCH_MAX_INTERACTIVE_ROWS:2000}
      max-running-per-user: ${SQL_WORKBENCH_MAX_RUNNING_PER_USER:5}
      task-timeout-minutes: ${SQL_WORKBENCH_TASK_TIMEOUT_MINUTES:30}
      timeout-seconds: ${SQL_WORKBENCH_TIMEOUT_SECONDS:30}
      scan-threshold-bytes: ${SQL_WORKBENCH_SCAN_THRESHOLD_BYTES:1099511627776}
      result-retention-minutes: ${SQL_WORKBENCH_RESULT_RETENTION_MINUTES:15}
      export-max-rows: ${SQL_WORKBENCH_EXPORT_MAX_ROWS:50000}
      pool:
        max-size: ${TRINO_POOL_MAX_SIZE:10}
        min-idle: ${TRINO_POOL_MIN_IDLE:2}
        connection-timeout-ms: ${TRINO_POOL_CONNECTION_TIMEOUT_MS:5000}
        idle-timeout-ms: ${TRINO_POOL_IDLE_TIMEOUT_MS:600000}
        max-lifetime-ms: ${TRINO_POOL_MAX_LIFETIME_MS:1800000}
    apisix-admin:
      base-url: ${APISIX_ADMIN_URL:http://localhost:9180/apisix/admin}
      key: ${APISIX_ADMIN_KEY:edd1c9f034335f136f87ad84b625c8f1}
    postgrest:
      endpoint: ${POSTGREST_URL:http://postgrest:3000}
    minio:
      endpoint: ${MINIO_URL:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:${AWS_ACCESS_KEY_ID:minio}}
      secret-key: ${MINIO_SECRET_KEY:${AWS_SECRET_ACCESS_KEY:minio12345}}
      log-bucket: ${ONELAKE_LOG_BUCKET:onelake-logs}
    kafka:
      bootstrap-servers: ${KAFKA_BOOTSTRAP:kafka:29092}
    flink:
      jobmanager-url: ${FLINK_URL:http://localhost:8082}
    analytics:
      superset:
        base-url: ${SUPERSET_URL:http://localhost:8088}
        admin-user: ${SUPERSET_ADMIN_USER:admin}
        admin-password: ${SUPERSET_ADMIN_PASSWORD:admin}
        guest-token-jwt-secret: ${SUPERSET_GUEST_TOKEN_JWT_SECRET:onelake-superset-guest}
      jupyterhub:
        base-url: ${JUPYTERHUB_URL:http://localhost:18000}
        admin-token: ${JUPYTERHUB_ADMIN_TOKEN:}
        notebook-token-ttl-seconds: ${JUPYTERHUB_NOTEBOOK_TOKEN_TTL:3600}
      notebook:
        poll-interval: ${ANALYTICS_NOTEBOOK_POLL_INTERVAL:30000}
        run-timeout-minutes: ${ANALYTICS_NOTEBOOK_RUN_TIMEOUT_MINUTES:30}
      query:
        slow-threshold-ms: ${ANALYTICS_QUERY_SLOW_THRESHOLD:5000}
      llm:
        provider: ${ONELAKE_LLM_PROVIDER:openai}
        openai:
          api-key: ${OPENAI_API_KEY:}
          base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
          model: ${OPENAI_MODEL:gpt-4o-mini}

logging:
  level:
    com.onelake: INFO
    org.hibernate.SQL: WARN
    org.springframework: INFO
