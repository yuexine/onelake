# OneLake dbt profile - Trino on Iceberg
onelake:
  target: dev
  outputs:
    dev:
      type: trino
      host: "{{ env_var('TRINO_HOST', 'localhost') }}"
      port: "{{ env_var('TRINO_PORT', 8080) | int }}"
      user: "{{ env_var('TRINO_USER', 'onelake') }}"
      password: "{{ env_var('TRINO_PASSWORD', '') }}"
      catalog: iceberg
      schema: "{{ env_var('DBT_SCHEMA', 'ods') }}"
      threads: 4
      http_scheme: http
