# OneLake 数据面底座
# 严格按照《技术初始化文档》§3.1 与 §6.1 配置
services:
  postgres:
    image: postgres:16
    container_name: onelake-postgres
    environment:
      POSTGRES_DB: onelake
      POSTGRES_USER: onelake
      POSTGRES_PASSWORD: onelake
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/postgres-init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onelake -d onelake"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: onelake-redis
    ports: ["6379:6379"]
    volumes: ["redisdata:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: onelake-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 6

  hive-metastore-db:
    image: postgres:16
    container_name: onelake-hms-db
    environment:
      POSTGRES_DB: metastore
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive123
    volumes: ["hmsdbdata:/var/lib/postgresql/data"]

  hive-metastore:
    build:
      context: ./trino
      dockerfile: hive-metastore.Dockerfile
    image: onelake-hive-metastore:4.0.0-postgres
    container_name: onelake-hms
    depends_on: [hive-metastore-db, minio]
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      IS_RESUME: "false"
    ports: ["9083:9083"]
    volumes:
      - ./trino/hive-site.xml:/opt/hive/conf/hive-site.xml:ro

  trino:
    image: trinodb/trino:latest
    container_name: onelake-trino
    depends_on: [hive-metastore, minio]
    ports: ["18080:8080"]
    volumes:
      - ./trino/catalog:/etc/trino/catalog:ro
      - ./trino/jvm.config:/etc/trino/jvm.config:ro
      - ./trino/access-control.properties:/etc/trino/access-control.properties:ro
      - ./trino/access-control-rules.json:/etc/trino/access-control-rules.json:ro

  # ===== P-Spark: Spark runtime shared with Trino (C5 / docs/流水线模块重设计方案.md §6.4) =====
  # Shares Iceberg + Hive Metastore + MinIO with Trino so cross-engine table-level deps close.
  spark-master:
    image: apache/spark:3.5.1-scala2.12-java17-ubuntu
    container_name: onelake-spark-master
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.master.Master
      --host spark-master --port 7077 --webui-port 8080
    environment:
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: 7077
      # Shared Iceberg/Hive/MinIO config (same S3 endpoint as Trino)
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio12345
    depends_on: [hive-metastore, minio]
    ports: ["18081:8080"]   # Spark Master Web UI
    volumes:
      - ./spark/conf:/opt/spark/conf:ro
      - ./spark/jars:/opt/spark/extra-jars:ro

  spark-worker:
    image: apache/spark:3.5.1-scala2.12-java17-ubuntu
    container_name: onelake-spark-worker
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
      --host 0.0.0.0 --webui-port 8081
    environment:
      SPARK_MASTER: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2g
      SPARK_WORKER_CORES: 2
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio12345
    depends_on: [spark-master]
    ports: ["18082:8081"]   # Spark Worker Web UI
    volumes:
      - ./spark/conf:/opt/spark/conf:ro
      - ./spark/jars:/opt/spark/extra-jars:ro

  keycloak:
    image: quay.io/keycloak/keycloak:25.0.6
    container_name: onelake-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/onelake
      KC_DB_USERNAME: onelake
      KC_DB_PASSWORD: onelake
    ports: ["8081:8080"]
    depends_on: [postgres]

  openmetadata-es:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: onelake-om-es
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes: ["omesdata:/usr/share/elasticsearch/data"]

  openmetadata-mysql:
    image: mysql:8.0
    container_name: onelake-om-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_USER: openmetadata
      MYSQL_PASSWORD: openmetadata
      MYSQL_DATABASE: openmetadata_db
    volumes: ["ommysqldata:/var/lib/mysql"]
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uopenmetadata -popenmetadata"]
      interval: 5s
      timeout: 5s
      retries: 20

  openmetadata:
    image: openmetadata/server:1.5.6
    container_name: onelake-openmetadata
    depends_on:
      openmetadata-es:
        condition: service_started
      openmetadata-mysql:
        condition: service_healthy
    environment:
      ELASTICSEARCH_HOST: openmetadata-es
      ELASTICSEARCH_PORT: "9200"
      DB_HOST: openmetadata-mysql
      DB_USER: openmetadata
      DB_USER_PASSWORD: openmetadata
      OM_DATABASE: openmetadata_db
    ports: ["8585:8585"]

  postgrest:
    image: postgrest/postgrest:latest
    container_name: onelake-postgrest
    environment:
      PGRST_DB_URI: postgres://onelake:onelake@postgres:5432/onelake
      PGRST_DB_SCHEMA: dataservice_api
      PGRST_DB_ANON_ROLE: web_anon
      PGRST_JWT_SECRET: onelake-dev-secret-change-me-please-rotate
    ports: ["3001:3000"]
    depends_on: [postgres]

  etcd:
    image: quay.io/coreos/etcd:v3.5.21
    container_name: onelake-etcd
    command:
      - /usr/local/bin/etcd
      - --name=etcd
      - --data-dir=/etcd-data
      - --advertise-client-urls=http://etcd:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --initial-advertise-peer-urls=http://etcd:2380
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-cluster=etcd=http://etcd:2380
      - --initial-cluster-token=onelake-etcd
      - --initial-cluster-state=new

  apisix:
    image: apache/apisix:latest
    container_name: onelake-apisix
    ports: ["9080:9080", "9180:9180"]
    volumes:
      - ./apisix/config.yaml:/usr/local/apisix/conf/config.yaml:ro
    depends_on: [postgrest, etcd]

  dagster-postgres:
    image: postgres:16
    container_name: onelake-dagster-pg
    environment:
      POSTGRES_DB: dagster
      POSTGRES_USER: dagster
      POSTGRES_PASSWORD: dagster123
    volumes: ["dagsterpgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dagster -d dagster"]
      interval: 5s
      timeout: 5s
      retries: 10

  dagster-user-code:
    build:
      context: ./dagster
      dockerfile: Dockerfile_user_code
    image: onelake-dagster-user-code:latest
    container_name: onelake-dagster-user-code
    read_only: true
    cap_drop: ["ALL"]
    # 自定义 seccomp 保留 Bubblewrap 所需的 namespace/mount 调用，同时阻断
    # ptrace、BPF、内核模块、跨进程内存访问等高风险 syscall。
    security_opt: ["no-new-privileges:true", "seccomp:./dagster/seccomp-user-code.json"]
    tmpfs:
      - /tmp:size=512m,mode=1777
      - /home/onelake:size=512m,uid=10001,gid=10001,mode=700
      # Dagster step compute logs / default IO manager need a writable runtime area;
      # it is not mounted into the inner Bubblewrap script sandbox.
      - /opt/dagster/dagster_home:size=512m,uid=10001,gid=10001,mode=700
    environment:
      DAGSTER_POSTGRES_HOST: dagster-postgres
      DAGSTER_POSTGRES_USER: dagster
      DAGSTER_POSTGRES_PASSWORD: dagster123
      DAGSTER_POSTGRES_DB: dagster
      DAGSTER_CURRENT_IMAGE: onelake-dagster-user-code:latest
      ONELAKE_DBT_PROJECT_DIR: /opt/onelake/dbt
      ONELAKE_DBT_PROFILES_DIR: /opt/onelake/dbt
      TRINO_HOST: trino
      TRINO_PORT: 8080
      TRINO_USER: onelake_pipeline
      DBT_SCHEMA: ods
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio12345
      MINIO_ENDPOINT: http://minio:9000
      ONELAKE_LOG_BUCKET: onelake-logs
      ONELAKE_CALLBACK_BASE_URL: ${ONELAKE_CALLBACK_BASE_URL:-${ONELAKE_ORCHESTRATION_CALLBACK_BASE_URL:-http://host.docker.internal:8080}}
      ONELAKE_INTERNAL_TOKEN: ${ONELAKE_INTERNAL_TOKEN:-${ONELAKE_ORCHESTRATION_INTERNAL_TOKEN:-dev-internal-token}}
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./dbt:/opt/onelake/dbt
    healthcheck:
      test: ["CMD", "dagster", "api", "grpc-health-check", "-p", "4000"]
      interval: 5s
      timeout: 5s
      retries: 20

  dagster-webserver:
    build:
      context: ./dagster
      dockerfile: Dockerfile_dagster
    image: onelake-dagster-webserver:latest
    container_name: onelake-dagster
    command: ["dagster-webserver", "-h", "0.0.0.0", "-p", "3000", "-w", "workspace.yaml"]
    ports: ["3000:3000"]
    depends_on:
      dagster-postgres:
        condition: service_healthy
      dagster-user-code:
        condition: service_healthy
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
      DAGSTER_POSTGRES_HOST: dagster-postgres
      DAGSTER_POSTGRES_USER: dagster
      DAGSTER_POSTGRES_PASSWORD: dagster123
      DAGSTER_POSTGRES_DB: dagster
    volumes: ["dagsterhome:/opt/dagster/dagster_home"]

  dagster-daemon:
    image: onelake-dagster-webserver:latest
    container_name: onelake-dagster-daemon
    command: ["dagster-daemon", "run"]
    depends_on:
      dagster-postgres:
        condition: service_healthy
      dagster-user-code:
        condition: service_healthy
      dagster-webserver:
        condition: service_started
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
      DAGSTER_POSTGRES_HOST: dagster-postgres
      DAGSTER_POSTGRES_USER: dagster
      DAGSTER_POSTGRES_PASSWORD: dagster123
      DAGSTER_POSTGRES_DB: dagster
    volumes: ["dagsterhome:/opt/dagster/dagster_home"]

  superset:
    image: apache/superset:latest
    container_name: onelake-superset
    ports: ["8088:8088"]
    environment:
      SUPERSET_SECRET_KEY: onelake-superset-dev
      # 开启嵌入式 SDK（对应 §7.10）
      SUPERSET_FEATURE_EMBEDDED_SUPERSET: "true"
      # guest token JWT 密钥（与 backend application.yml 的 superset.guest-token-jwt-secret 对齐）
      GUEST_TOKEN_JWT_SECRET: onelake-superset-guest
      GUEST_TOKEN_JWT_EXP_SECONDS: "3600"
    volumes:
      - supersetdata:/app/superset_home
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py:ro

  jupyterhub:
    build:
      context: ./jupyter
      dockerfile: Dockerfile
    image: onelake/jupyterhub:4.1
    container_name: onelake-jupyterhub
    ports: ["18000:8000"]
    environment:
      KEYCLOAK_ISSUER: http://keycloak:8080/realms/onelake
      OAUTH_CALLBACK_URL: http://localhost:18000/hub/oauth_callback
      OAUTH_CLIENT_ID: jupyterhub
      OAUTH_CLIENT_SECRET: jupyterhub-dev-secret
      ONELAKE_CONTROL_PLANE_URL: http://backend:8080
      TRINO_HOST: trino
    depends_on: [keycloak]
    volumes:
      - jupyterdata:/srv/jupyterhub/data
      - ./jupyter/onelake:/opt/onelake/sdk:ro

  # ──────────────────────────────────────────────
  # CDC 数据面：Kafka + Flink（对应《数据面开发指南》§4）
  # ──────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: onelake-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports: ["2181:2181"]

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: onelake-kafka
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  flink-jobmanager:
    image: flink:1.18-java17
    container_name: onelake-flink-jm
    ports: ["8082:8081"]
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        rest.port: 8081
        state.checkpoints.dir: file:///tmp/flink-checkpoints
        execution.checkpointing.interval: 30s
        execution.checkpointing.mode: EXACTLY_ONCE
    command: jobmanager

  flink-taskmanager:
    image: flink:1.18-java17
    container_name: onelake-flink-tm
    depends_on: [flink-jobmanager]
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        state.checkpoints.dir: file:///tmp/flink-checkpoints
    command: taskmanager

volumes:
  pgdata:
  redisdata:
  miniodata:
  hmsdbdata:
  omesdata:
  ommysqldata:
  apisixdata:
  dagsterhome:
  dagsterpgdata:
  supersetdata:
  jupyterdata:
