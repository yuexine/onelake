# P-Spark: Spark defaults — Iceberg + S3A + Hive Metastore integration
# Shares the same catalog as Trino (hive-metastore + minio).
# See docs/流水线模块重设计方案.md §6.4.

# ----- Iceberg runtime -----
spark.jars.packages                   org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.5.2,org.apache.hadoop:hadoop-aws:3.3.4
spark.sql.extensions                   org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
spark.sql.defaultCatalog               onelake
spark.sql.catalog.onelake              org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.onelake.type         hive
spark.sql.catalog.onelake.uri          thrift://hive-metastore:9083
spark.sql.catalog.onelake.warehouse    s3a://onelake/warehouse
spark.sql.catalog.onelake.io-impl      org.apache.iceberg.aws.s3.S3FileIO

# ----- S3A / MinIO -----
spark.hadoop.fs.s3a.endpoint           http://minio:9000
spark.hadoop.fs.s3a.path.style.access  true
spark.hadoop.fs.s3a.connection.ssl.enabled false
spark.hadoop.fs.s3a.impl               org.apache.hadoop.fs.s3a.S3AFileSystem

# ----- Resource profile defaults (overridden by compute_profile) -----
spark.executor.memory                  2g
spark.executor.cores                   2
spark.num.executors                    2
spark.driver.memory                    1g

# ----- Logging -----
spark.eventLog.enabled                 true
spark.eventLog.dir                     s3a://onelake/spark-events
